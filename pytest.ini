[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    slow: Markiert langsame Tests (z.B. LLM-Integration)
    unit: Unit-Tests (schnell, keine externen Abhängigkeiten)
    integration: Integrationstests (benötigen Provider)